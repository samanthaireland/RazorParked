<div id="page-host-reports" class="page">
    <button class="btn-ghost" onclick="showPage('host')" style="margin-bottom:24px">← Back to My Listings</button>

    <div class="page-header">
        <h2>Host Reports</h2>
        <p>Track earnings, reservations, and parking usage for your listings.</p>
    </div>

    <div class="detail-grid" style="margin-bottom:24px">
        <div class="detail-item">
            <label>Total Earnings</label>
            <span id="report-total-earnings">$0.00</span>
        </div>
        <div class="detail-item">
            <label>Total Reservations</label>
            <span id="report-total-reservations">0</span>
        </div>
        <div class="detail-item">
            <label>Confirmed</label>
            <span id="report-confirmed">0</span>
        </div>
        <div class="detail-item">
            <label>Cancelled</label>
            <span id="report-cancelled">0</span>
        </div>
    </div>

    <div class="form-card" style="max-width:100%;margin-bottom:24px">
        <div class="card-top">
            <div class="form-title" style="font-size:24px">Earnings Breakdown</div>
            <div class="form-subtitle">Income by listing</div>
        </div>
        <div id="earnings-report"></div>
        <canvas id="earningsChart" height="110" style="margin-top:20px"></canvas>
    </div>

    <div class="form-card" style="max-width:100%;margin-bottom:24px">
        <div class="card-top">
            <div class="form-title" style="font-size:24px">Reservations Report</div>
            <div class="form-subtitle">Dates and booking statuses</div>
        </div>
        <div id="reservations-report"></div>
    </div>

    <div class="form-card" style="max-width:100%">
        <div class="card-top">
            <div class="form-title" style="font-size:24px">Usage Analytics</div>
            <div class="form-subtitle">Booking activity overview</div>
        </div>
        <div id="usage-report"></div>
        <canvas id="usageChart" height="110" style="margin-top:20px"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        let earningsChartInstance = null;
        let usageChartInstance = null;

        async function loadHostReports() {
            const currentUser = JSON.parse(localStorage.getItem('rp_user') || 'null');
            if (!currentUser) return;

            const hostId = currentUser.userId;

            try {
                const [earningsRes, reservationsRes, usageRes] = await Promise.all([
                    fetch(`/api/Reports/host/${hostId}/earnings`),
                    fetch(`/api/Reports/host/${hostId}/reservations`),
                    fetch(`/api/Reports/host/${hostId}/usage`)
                ]);

                if (!earningsRes.ok || !reservationsRes.ok || !usageRes.ok) {
                    throw new Error('Failed to load one or more report endpoints.');
                }

                const earnings = await earningsRes.json();
                const reservations = await reservationsRes.json();
                const usage = await usageRes.json();

                // Summary
                document.getElementById('report-total-earnings').textContent =
                    '$' + Number(earnings.totalEarnings ?? 0).toFixed(2);

                const reservationList = Array.isArray(reservations)
                    ? reservations
                    : (reservations.reservations ?? []);

                document.getElementById('report-total-reservations').textContent =
                    reservationList.length;

                document.getElementById('report-confirmed').textContent =
                    Number(usage.confirmed ?? 0);

                document.getElementById('report-cancelled').textContent =
                    Number(usage.cancelled ?? 0);

                renderEarningsBreakdown(earnings);
                renderReservationsReport(reservationList);
                renderUsageAnalytics(usage);

            } catch (err) {
                console.error('Error loading reports:', err);

                document.getElementById('earnings-report').innerHTML =
                    '<p style="color:#9d2235;font-size:14px">Error loading earnings data.</p>';

                document.getElementById('reservations-report').innerHTML =
                    '<p style="color:#9d2235;font-size:14px">Error loading reservations data.</p>';

                document.getElementById('usage-report').innerHTML =
                    '<p style="color:#9d2235;font-size:14px">Error loading usage data.</p>';
            }
        }

        function renderEarningsBreakdown(earnings) {
            const container = document.getElementById('earnings-report');
            const byListing = earnings.breakdown ?? earnings.byListing ?? [];

            if (!byListing.length) {
                container.innerHTML = '<p style="color:#7a6e62;font-size:14px">No earnings data yet.</p>';
                return;
            }

            container.innerHTML = `
                    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:12px">
                        <thead>
                            <tr style="background:#f3f0ec">
                                <th style="text-align:left;padding:10px 14px;color:#7a6e62;font-size:12px;text-transform:uppercase">Listing</th>
                                <th style="text-align:right;padding:10px 14px;color:#7a6e62;font-size:12px;text-transform:uppercase">Earnings</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${byListing.map(item => `
                                <tr style="border-bottom:1px solid #e5e0d8">
                                    <td style="padding:12px 14px">${item.title ?? item.listingTitle ?? item.listing ?? 'Listing'}</td>
                                    <td style="padding:12px 14px;text-align:right;font-weight:600;color:#9d2235">
                                        $${Number(item.earnings ?? item.totalEarnings ?? item.total ?? 0).toFixed(2)}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

            if (earningsChartInstance) {
                earningsChartInstance.destroy();
            }

            earningsChartInstance = new Chart(document.getElementById('earningsChart'), {
                type: 'bar',
                data: {
                    labels: byListing.map(i => i.title ?? i.listingTitle ?? i.listing ?? 'Listing'),
                    datasets: [{
                        label: 'Earnings ($)',
                        data: byListing.map(i => Number(i.earnings ?? i.totalEarnings ?? i.total ?? 0)),
                        backgroundColor: '#9d2235',
                        borderRadius: 6
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function renderReservationsReport(list) {
            const container = document.getElementById('reservations-report');

            if (!list.length) {
                container.innerHTML = '<p style="color:#7a6e62;font-size:14px">No reservations yet.</p>';
                return;
            }

            container.innerHTML = `
                    <table style="width:100%;border-collapse:collapse;font-size:14px;margin-top:12px">
                        <thead>
                            <tr style="background:#f3f0ec">
                                <th style="text-align:left;padding:10px 14px;color:#7a6e62;font-size:12px;text-transform:uppercase">Listing</th>
                                <th style="text-align:left;padding:10px 14px;color:#7a6e62;font-size:12px;text-transform:uppercase">Date</th>
                                <th style="text-align:left;padding:10px 14px;color:#7a6e62;font-size:12px;text-transform:uppercase">Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${list.map(r => `
                                <tr style="border-bottom:1px solid #e5e0d8">
                                    <td style="padding:12px 14px">${r.listing ?? r.title ?? r.listingTitle ?? 'Spot'}</td>
                                    <td style="padding:12px 14px;font-size:13px;color:#7a6e62">
                                        ${formatDate(r.start ?? r.reservationStart ?? r.date)}
                                    </td>
                                    <td style="padding:12px 14px">
                                        <span style="
                                            display:inline-block;font-size:11px;font-weight:700;
                                            padding:3px 10px;border-radius:100px;text-transform:uppercase;
                                            background:${r.status === 'Confirmed' ? '#edf7f0' : '#f5e8eb'};
                                            color:${r.status === 'Confirmed' ? '#2d7a4f' : '#9d2235'};
                                            border:1px solid ${r.status === 'Confirmed' ? '#b3dfc4' : '#e8b4bc'}
                                        ">${r.status ?? 'Unknown'}</span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
        }

        function renderUsageAnalytics(usage) {
            const container = document.getElementById('usage-report');

            const chartData = [
                { label: 'Total', count: Number(usage.totalReservations ?? 0) },
                { label: 'Confirmed', count: Number(usage.confirmed ?? 0) },
                { label: 'Cancelled', count: Number(usage.cancelled ?? 0) }
            ];

            container.innerHTML = `
                    <p style="font-size:14px;color:#7a6e62;margin-bottom:8px">
                        Total bookings: <strong style="color:#1a1208">${Number(usage.totalReservations ?? 0)}</strong>
                    </p>
                `;

            if (usageChartInstance) {
                usageChartInstance.destroy();
            }

            usageChartInstance = new Chart(document.getElementById('usageChart'), {
                type: 'line',
                data: {
                    labels: chartData.map(x => x.label),
                    datasets: [{
                        label: 'Bookings',
                        data: chartData.map(x => x.count),
                        borderColor: '#9d2235',
                        backgroundColor: 'rgba(157,34,53,0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: '#9d2235'
                    }]
                },
                options: {
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        function formatDate(value) {
            if (!value) return 'N/A';

            const date = new Date(value);
            if (isNaN(date.getTime())) return 'N/A';

            return date.toLocaleDateString();
        }

        loadHostReports();
    </script>
</div>
