<div class="page-section active">
    <button class="btn-ghost" onclick="showPage('my-reservations')" style="margin-bottom:24px">← Back to Reservations</button>
    <div class="form-card">
        <div class="card-top">
            <div class="form-title">Confirm Payment</div>
            <div class="form-subtitle">Complete your reservation payment.</div>
        </div>
        <div id="payment-summary" style="margin-bottom:24px"></div>
        <div class="form-group">
            <label>Payment Method</label>
            <select id="pay-method">
                <option value="Venmo">Venmo</option>
                <option value="CreditCard">Credit Card</option>
                <option value="InAppCredit">In-App Credit</option>
            </select>
        </div>
        <button class="btn-primary" style="width:100%" onclick="confirmPayment()">Confirm Payment</button>
        <div id="pay-msg" class="msg"></div>
    </div>
</div>
