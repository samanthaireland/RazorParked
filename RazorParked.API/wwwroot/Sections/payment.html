     Owner:   Ryleigh
     API:     POST /api/Payments
═══════════════════════════════════════════════════════ -->

<style>
    .pay-summary-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 16px;
        margin-bottom: 16px;
    }

    .pay-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        padding: 4px 0;
        color: var(--text);
    }

        .pay-row .label {
            color: var(--muted);
        }

    .pay-divider {
        height: 1px;
        background: var(--border);
        margin: 10px 0;
    }

    .pay-total {
        display: flex;
        justify-content: space-between;
        font-size: 17px;
        font-weight: 600;
        padding: 4px 0;
    }

        .pay-total .amount {
            color: var(--red);
        }

    .method-option {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        padding: 14px 16px;
        margin-bottom: 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s;
    }

        .method-option:hover {
            border-color: var(--red);
        }

        .method-option.selected {
            border-color: var(--red);
            background: var(--red-light);
        }

    .method-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid var(--border);
        flex-shrink: 0;
        transition: all 0.2s;
    }

    .method-option.selected .method-dot {
        border-color: var(--red);
        background: var(--red);
    }

    .method-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
    }

    .method-desc {
        font-size: 12px;
        color: var(--muted);
        margin-top: 1px;
    }

    .credit-balance-box {
        background: var(--gold-light);
        border: 1px solid var(--gold);
        border-radius: var(--radius);
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 12px 0;
    }

    .credit-label {
        font-size: 11px;
        font-weight: 700;
        color: #7a5a10;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2px;
    }

    .credit-amount {
        font-size: 22px;
        font-weight: 600;
        color: #7a5a10;
    }

    .add-credit-btn {
        background: var(--gold);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
    }
</style>

<div class="page-section active">
    <button class="btn-ghost" onclick="showPage('my-reservations')" style="margin-bottom:24px">← Back to Reservations</button>
    <div class="form-card" style="max-width:560px;margin:0 auto">
        <div class="card-top">
            <div class="form-title">Confirm Payment</div>
            <div class="form-subtitle">Complete your reservation payment.</div>
        </div>

        <!-- Summary injected by initPaymentPage() -->
        <div id="payment-summary"></div>

        <!-- Payment method selector -->
        <div class="form-group" style="margin-bottom:8px">
            <label>Payment Method</label>
        </div>

        <div onclick="selectPayMethod('Venmo')" class="method-option selected" id="method-Venmo">
            <div class="method-dot"></div>
            <div>
                <div class="method-name">Venmo</div>
                <div class="method-desc">Enter your @handle to confirm</div>
            </div>
        </div>
        <div onclick="selectPayMethod('CreditCard')" class="method-option" id="method-CreditCard">
            <div class="method-dot"></div>
            <div>
                <div class="method-name">Credit Card</div>
                <div class="method-desc">Visa, Mastercard, Amex</div>
            </div>
        </div>
        <div onclick="selectPayMethod('InAppCredit')" class="method-option" id="method-InAppCredit">
            <div class="method-dot"></div>
            <div>
                <div class="method-name">In-App Credit</div>
                <div class="method-desc">Use your RazorParked balance</div>
            </div>
        </div>

        <input type="hidden" id="pay-method" value="Venmo" />

        <!-- Dynamic form injected based on method -->
        <div id="payment-method-form" style="margin-top:4px"></div>

        <button class="btn-primary" style="width:100%;margin-top:20px" onclick="confirmPayment()">
            Confirm Payment
        </button>
        <div id="pay-msg" class="msg"></div>
    </div>
</div>
