<div class="page-section active">
    <div class="form-card">
        <div class="card-top">
            <div class="form-title">Create Account</div>
            <div class="form-subtitle">Join RazorParked — Go Hogs! 🐗</div>
        </div>
        <div class="form-group">
            <label>Full Name</label>
            <input id="reg-name" placeholder="Jane Smith" />
        </div>
        <div class="form-group">
            <label>Email</label>
            <input id="reg-email" type="email" placeholder="jane@uark.edu" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="reg-password" type="password" placeholder="••••••••" />
        </div>
        <div class="form-group">
            <label>I want to...</label>
            <div style="display:flex;gap:16px;margin-top:4px">
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
                    <input type="checkbox" id="role-customer" value="Customer" style="width:auto;accent-color:var(--red)" />
                    Find Parking (Driver)
                </label>
                <label style="display:flex;align-items:center;gap:8px;font-size:14px;text-transform:none;letter-spacing:0;color:var(--text);cursor:pointer">
                    <input type="checkbox" id="role-host" value="Host" style="width:auto;accent-color:var(--red)" />
                    List My Space (Host)
                </label>
            </div>
        </div>
        <button class="btn-primary" style="width:100%" onclick="register()">Create Account</button>
        <div id="reg-msg" class="msg"></div>
        <div class="form-link">Already have an account? <a onclick="showPage('login')">Log in</a></div>
    </div>
</div>

<script>
    async function register() {
        const msg = document.getElementById('reg-msg');
        msg.className = 'msg';

        const roles = [];
        if (document.getElementById('role-customer').checked) roles.push('Customer');
        if (document.getElementById('role-host').checked) roles.push('Host');

        if (roles.length === 0) {
            msg.className = 'msg error';
            msg.textContent = 'Please select at least one role.';
            return;
        }

        try {
            const res = await fetch('/api/Auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    fullName: document.getElementById('reg-name').value,
                    email: document.getElementById('reg-email').value,
                    password: document.getElementById('reg-password').value,
                    roleNames: roles
                })
            });
            const data = await res.json();
            if (res.ok) {
                msg.className = 'msg success';
                msg.textContent = 'Account created! Redirecting to login...';
                setTimeout(() => showPage('login'), 1500);
            } else {
                msg.className = 'msg error';
                msg.textContent = data.message || 'Registration failed.';
            }
        } catch {
            msg.className = 'msg error';
            msg.textContent = 'Connection error.';
        }
    }
</script>
