<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RazorParked</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Serif+4:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <!-- Leaflet.js — used by Kaden's search/map section -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --surface: #faf9f7;
            --surface2: #f3f0ec;
            --border: #e5e0d8;
            --red: #9d2235;
            --red-dark: #7a1a28;
            --red-light: #f5e8eb;
            --text: #1a1208;
            --muted: #7a6e62;
            --muted2: #a8a09a;
            --gold: #c0892a;
            --gold-light: #fdf6e8;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .ua-stripe {
            height: 5px;
            background: linear-gradient(90deg, var(--red) 0%, var(--gold) 50%, var(--red) 100%);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 64px;
            background: var(--red);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(157,34,53,0.25);
        }

        .nav-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

            .nav-logo span {
                color: var(--gold);
            }

        .nav-links {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.8);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

            .nav-btn:hover {
                background: rgba(255,255,255,0.15);
                color: #fff;
            }

            .nav-btn.highlight {
                background: #fff;
                color: var(--red);
                font-weight: 700;
            }

                .nav-btn.highlight:hover {
                    background: var(--gold-light);
                }

        #nav-user {
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

            #nav-user span {
                color: var(--gold);
                font-weight: 600;
                font-size: 13px;
            }

        #nav-logout {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

            #nav-logout:hover {
                border-color: #fff;
                color: #fff;
            }

        #app {
            min-height: calc(100vh - 69px - 72px);
        }

        .page-section {
            display: none;
            padding: 48px 40px;
            max-width: 1000px;
            margin: 0 auto;
            animation: fadeUp 0.3s ease;
        }

            .page-section.active {
                display: block;
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-loading {
            padding: 80px 40px;
            text-align: center;
            color: var(--muted);
            font-family: 'Source Serif 4', serif;
            font-style: italic;
            font-size: 15px;
        }

        .nav-mode-tab {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.55);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

            .nav-mode-tab.active-tab {
                background: rgba(255,255,255,0.2);
                color: #fff;
            }

        .btn-primary {
            background: var(--red);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            padding: 13px 28px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

            .btn-primary:hover {
                background: var(--red-dark);
                transform: translateY(-1px);
                box-shadow: 0 4px 14px rgba(157,34,53,0.3);
            }

        .btn-secondary {
            background: #fff;
            color: var(--text);
            border: 1.5px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            padding: 13px 28px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
        }

            .btn-secondary:hover {
                border-color: var(--red);
                color: var(--red);
            }

        .btn-ghost {
            background: none;
            border: none;
            color: var(--red);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 0;
            transition: opacity 0.2s;
        }

            .btn-ghost:hover {
                opacity: 0.7;
            }

        .form-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 480px;
            margin: 0 auto;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }

            .form-card .card-top {
                border-bottom: 3px solid var(--red);
                padding-bottom: 20px;
                margin-bottom: 28px;
            }

        .form-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 32px;
            letter-spacing: 1.5px;
            color: var(--text);
            margin-bottom: 4px;
        }

        .form-subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        .form-group {
            margin-bottom: 18px;
        }

            .form-group label {
                display: block;
                font-size: 11px;
                font-weight: 600;
                color: var(--muted);
                margin-bottom: 7px;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .form-group input, .form-group select, .form-group textarea {
                width: 100%;
                background: var(--surface);
                border: 1.5px solid var(--border);
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                font-size: 15px;
                padding: 11px 14px;
                border-radius: 8px;
                outline: none;
                transition: border-color 0.2s;
            }

                .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
                    border-color: var(--red);
                }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-link {
            font-size: 14px;
            color: var(--muted);
            margin-top: 18px;
            text-align: center;
        }

            .form-link a {
                color: var(--red);
                cursor: pointer;
                font-weight: 600;
                text-decoration: none;
            }

                .form-link a:hover {
                    text-decoration: underline;
                }

        .msg {
            padding: 11px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 14px;
            display: none;
        }

            .msg.success {
                background: #edf7f0;
                border: 1px solid #6abf8a;
                color: #2d7a4f;
                display: block;
            }

            .msg.error {
                background: var(--red-light);
                border: 1px solid var(--red);
                color: var(--red-dark);
                display: block;
            }

        .page-header {
            margin-bottom: 32px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

            .page-header h2 {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 40px;
                letter-spacing: 1.5px;
                color: var(--text);
                margin-bottom: 4px;
            }

            .page-header p {
                font-size: 15px;
                color: var(--muted);
            }

        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
            margin-top: 24px;
        }

        .listing-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            padding: 22px;
            cursor: pointer;
            transition: all 0.2s;
        }

            .listing-card:hover {
                border-color: var(--red);
                box-shadow: 0 6px 20px rgba(157,34,53,0.1);
                transform: translateY(-2px);
            }

            .listing-card h3 {
                font-family: 'Source Serif 4', serif;
                font-size: 17px;
                font-weight: 700;
                margin-bottom: 6px;
                color: var(--text);
            }

            .listing-card .location {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 14px;
            }

            .listing-card .price {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 26px;
                letter-spacing: 1px;
                color: var(--red);
            }

                .listing-card .price span {
                    font-family: 'DM Sans', sans-serif;
                    font-size: 13px;
                    color: var(--muted);
                    font-weight: 400;
                    letter-spacing: 0;
                }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 100px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

            .badge.available {
                background: #edf7f0;
                color: #2d7a4f;
                border: 1px solid #b3dfc4;
            }

            .badge.unavailable {
                background: var(--red-light);
                color: var(--red);
                border: 1px solid #e8b4bc;
            }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .detail-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px 16px;
        }

            .detail-item label {
                font-size: 10px;
                font-weight: 700;
                color: var(--muted2);
                text-transform: uppercase;
                letter-spacing: 1px;
                display: block;
                margin-bottom: 4px;
            }

            .detail-item span {
                font-size: 16px;
                font-weight: 600;
                color: var(--text);
            }

        .empty {
            text-align: center;
            padding: 64px 20px;
            color: var(--muted);
        }

            .empty .empty-icon {
                font-size: 44px;
                margin-bottom: 14px;
            }

            .empty p {
                font-size: 15px;
                font-family: 'Source Serif 4', serif;
            }

        .loading {
            color: var(--muted);
            font-size: 14px;
            padding: 48px;
            text-align: center;
            font-family: 'Source Serif 4', serif;
            font-style: italic;
        }

        footer {
            margin-top: 80px;
            background: var(--red);
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

            footer .footer-logo {
                font-family: 'Bebas Neue', sans-serif;
                font-size: 20px;
                letter-spacing: 2px;
                color: #fff;
            }

            footer span {
                color: var(--gold);
            }
    </style>
</head>
<body>

    <div class="ua-stripe"></div>

    <nav>
        <div class="nav-logo" onclick="showPage('home')">🐗 Razor<span>Parked</span></div>
        <div class="nav-links" id="nav-guest">
            <button class="nav-btn" onclick="showPage('search')">Find Parking</button>
            <button class="nav-btn" onclick="showPage('login')">Log In</button>
            <button class="nav-btn highlight" onclick="showPage('register')">Sign Up</button>
        </div>
        <div id="nav-user">
            <span id="nav-name"></span>
            <div id="nav-mode-switcher" style="display:none;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:100px;overflow:hidden">
                <button id="tab-parking" onclick="setAppMode('customer')" class="nav-mode-tab">🚗 I'm Parking</button>
                <button id="tab-hosting" onclick="setAppMode('host')" class="nav-mode-tab">🏠 I'm Hosting</button>
            </div>
            <button class="nav-btn" id="nav-find-parking-btn" onclick="showPage('search')">Find Parking</button>
            <button class="nav-btn" id="nav-host-btn" onclick="showPage('host')" style="display:none">My Listings</button>
            <button class="nav-btn" id="nav-reservations-btn" onclick="showPage('my-reservations')">My Reservations</button>
            <button id="nav-logout" onclick="logout()">Log Out</button>
        </div>
    </nav>

    <div id="app">
        <div class="section-loading">Loading RazorParked...</div>
    </div>

    <footer>
        <div class="footer-logo">🐗 RazorParked</div>
        <div>University of Arkansas &nbsp;·&nbsp; Fayetteville, AR &nbsp;·&nbsp; <span>Go Hogs!</span></div>
    </footer>

    <script>
        // ── GLOBAL STATE (read from any section via window.*) ──
        window.currentUser = JSON.parse(localStorage.getItem('rp_user') || 'null');
        window.selectedListingId = null;
        window.selectedReservationId = null;
        window.selectedPaymentAmount = 0;
        window.appMode = localStorage.getItem('rp_mode') || 'customer';

        window.leafletMap = null;
        window.currentView = 'list';
        window.mapMarkers = [];

        const SECTION_FILES = {
            'home': 'sections/home.html',
            'register': 'sections/register.html',
            'login': 'sections/login.html',
            'search': 'sections/search.html',
            'listing': 'sections/listing.html',
            'host': 'sections/host.html',
            'create-listing': 'sections/create-listing.html',
            'my-reservations': 'sections/my-reservations.html',
            'payment': 'sections/payment.html',
        };

        const _sectionCache = {};

        async function showPage(name) {
            const app = document.getElementById('app');

            if (!_sectionCache[name]) {
                app.innerHTML = `<div class="section-loading">Loading...</div>`;
                try {
                    const res = await fetch(SECTION_FILES[name]);
                    if (!res.ok) throw new Error(`Section "${name}" not found`);
                    _sectionCache[name] = await res.text();
                } catch (err) {
                    app.innerHTML = `<div class="section-loading">⚠️ Could not load section: ${name}</div>`;
                    console.error(err);
                    return;
                }
            }

            app.innerHTML = _sectionCache[name];

            app.querySelectorAll('script').forEach(oldScript => {
                const s = document.createElement('script');
                s.textContent = oldScript.textContent;
                oldScript.replaceWith(s);
            });

            if (name === 'host' && window.loadHostListings) window.loadHostListings();
            if (name === 'my-reservations' && window.loadMyReservations) window.loadMyReservations();
            if (name === 'search' && window.currentView === 'map' && window.leafletMap) {
                setTimeout(() => window.leafletMap.invalidateSize(), 150);
            }

            window.scrollTo(0, 0);
        }

        function updateNav() {
            const guest = document.getElementById('nav-guest');
            const user = document.getElementById('nav-user');
            const hostBtn = document.getElementById('nav-host-btn');
            const nameEl = document.getElementById('nav-name');
            const switcher = document.getElementById('nav-mode-switcher');
            const parkingBtn = document.getElementById('nav-find-parking-btn');
            const resBtn = document.getElementById('nav-reservations-btn');

            if (window.currentUser) {
                guest.style.display = 'none';
                user.style.display = 'flex';
                nameEl.textContent = window.currentUser.fullName;
                switcher.style.display = 'flex';
                applyModeTab();

                if (window.appMode === 'host') {
                    hostBtn.style.display = 'inline-block';
                    parkingBtn.style.display = 'none';
                    resBtn.style.display = 'none';
                } else {
                    hostBtn.style.display = 'none';
                    parkingBtn.style.display = 'inline-block';
                    resBtn.style.display = 'inline-block';
                }
            } else {
                guest.style.display = 'flex';
                user.style.display = 'none';
            }
        }

        function setAppMode(mode) {
            window.appMode = mode;
            localStorage.setItem('rp_mode', mode);
            applyModeTab();
            updateNav();
            if (document.querySelector('.page-section')) showPage('home');
        }

        function applyModeTab() {
            const tabP = document.getElementById('tab-parking');
            const tabH = document.getElementById('tab-hosting');
            if (!tabP || !tabH) return;
            const isHost = window.appMode === 'host';
            tabP.classList.toggle('active-tab', !isHost);
            tabH.classList.toggle('active-tab', isHost);
        }

        function logout() {
            window.currentUser = null;
            localStorage.removeItem('rp_user');
            updateNav();
            showPage('home');
        }

        updateNav();
        showPage('home');
    </script>
</body>
</html>
