<div class="page-section active">
    <div class="form-card">
        <div class="card-top">
            <div class="form-title">Welcome Back</div>
            <div class="form-subtitle">Log in to your RazorParked account.</div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input id="login-email" type="email" placeholder="jane@uark.edu" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input id="login-password" type="password" placeholder="••••••••" />
        </div>
        <button class="btn-primary" style="width:100%" onclick="login()">Log In</button>
        <div id="login-msg" class="msg"></div>
        <div class="form-link">Don't have an account? <a onclick="showPage('register')">Sign up</a></div>
    </div>
</div>

<script>
    // ── POST /api/Auth/login ──
    async function login() {
        const msg = document.getElementById('login-msg');
        msg.className = 'msg';
        try {
            const res = await fetch('/api/Auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email    : document.getElementById('login-email').value,
                    password : document.getElementById('login-password').value
                })
            });
            const data = await res.json();
            if (res.ok) {
                window.currentUser = {
                    userId   : data.userId,
                    fullName : data.fullName,
                    email    : data.email,
                    role     : data.role || 'Customer'
                };
                localStorage.setItem('rp_user', JSON.stringify(window.currentUser));
                updateNav();   // defined in index.html
                showPage('home');
            } else {
                msg.className   = 'msg error';
                msg.textContent = data.message || 'Invalid credentials.';
            }
        } catch {
            msg.className   = 'msg error';
            msg.textContent = 'Connection error.';
        }
    }
</script>
