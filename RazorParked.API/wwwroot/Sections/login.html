<div class="form-card">
    <div class="card-top">
        <div class="form-title">Welcome Back</div>
        <div class="form-subtitle">Log in to your RazorParked account.</div>
    </div>
    <div class="form-group">
        <label>Email</label>
        <input id="login-email" type="email" placeholder="jane@uark.edu" />
    </div>
    <div class="form-group">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="••••••••" />
    </div>
    <button class="btn-primary" style="width:100%" onclick="login()">Log In</button>
    <div id="login-msg" class="msg"></div>
    <div class="form-link">Don't have an account? <a onclick="showPage('register')">Sign up</a></div>

    <input id="login-email" type="email" placeholder="jane@uark.edu" autocomplete="off" />
    <input id="login-password" type="password" placeholder="••••••••" autocomplete="new-password" />
</div>
