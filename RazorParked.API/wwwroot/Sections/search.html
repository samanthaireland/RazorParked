<!-- SECTION: SEARCH LISTINGS — Owner: Kaden -->

<div class="page-section active">
    <div class="page-header">
        <h2>Find Parking</h2>
        <p>Browse available spots near your event.</p>
    </div>

    <div class="filters">
        <div class="form-group">
            <label>Event / Location</label>
            <input id="search-location" placeholder="Razorback Stadium, Dickson St..." />
        </div>
        <div class="form-group">
            <label>Max Price / hr ($)</label>
            <input id="search-price" type="number" min="0" placeholder="50" />
        </div>
        <div class="form-group">
            <label>Availability</label>
            <select id="search-availability">
                <option value="">Any</option>
                <option value="true">Available Only</option>
            </select>
        </div>
        <button class="btn-primary" onclick="searchListings()">Search</button>
    </div>

    <div style="margin-top:16px;margin-bottom:16px">
        <div id="rp-cal-search"></div>
    </div>

    <div class="view-toggle">
        <button class="view-toggle-btn active" id="btn-list-view" onclick="setView('list')">☰ List View</button>
        <button class="view-toggle-btn" id="btn-map-view" onclick="setView('map')">🗺 Map View</button>
    </div>

    <div class="map-notice" id="map-notice">
        ⚠️ Some listings don't have coordinates and won't appear on the map.
    </div>

    <div id="map-container">
        <div id="leaflet-map"></div>
    </div>

    <div id="search-results">
        <div class="empty">
            <div class="empty-icon">🅿️</div>
            <p>Use the filters above to find parking near you.</p>
        </div>
    </div>
</div>

<script>
    if (typeof initSearchCalendar === 'function') initSearchCalendar();

    function toggleCalDrawer() {
        var drawer = document.getElementById('cal-drawer');
        var isOpen = drawer.style.display === 'block';
        drawer.style.display = isOpen ? 'none' : 'block';
        if (!isOpen && !_calSearchInited) {
            _calSearchInited = true;
            if (typeof initSearchCalendar === 'function') initSearchCalendar();
        }
    }

    async function searchListings() {
        var location = document.getElementById('search-location').value.trim();
        var price = document.getElementById('search-price').value;
        var availability = document.getElementById('search-availability').value;
        var arriveKey = window.calendarArriveKey || '';
        var departKey = window.calendarDepartKey || '';

        var params = new URLSearchParams();
        if (location) params.append('location', location);
        if (arriveKey) params.append('date', arriveKey);
        if (departKey) params.append('dateTo', departKey);
        if (price) params.append('maxPrice', price);
        if (availability) params.append('availability', availability);

        var url = '/api/Listings' + (params.toString() ? '?' + params.toString() : '');
        var container = document.getElementById('search-results');
        container.innerHTML = '<div class="loading">Searching for parking...</div>';

        var btn = document.getElementById('cal-date-display');
        if (arriveKey && departKey) {
            var aL = new Date(arriveKey + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            var dL = new Date(departKey + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            btn.textContent = '📅 ' + aL + ' → ' + dL;
            btn.style.borderColor = 'var(--red)';
            btn.style.color = 'var(--red)';
            document.getElementById('cal-drawer').style.display = 'none';
        }

        try {
            var res = await fetch(url);
            if (!res.ok) throw new Error('API error');
            var listings = await res.json();

            if (!listings || listings.length === 0) {
                container.innerHTML = '<div class="empty"><div class="empty-icon">🅿️</div><p>No listings found. Try adjusting your filters.</p></div>';
                if (window.currentView === 'map') clearMapMarkers();
                return;
            }

            var hostCache = {}, photoCache = {};
            await Promise.all(listings.map(async function (l) {
                var hid = l.hostUserID || l.HostUserID;
                if (hid && !hostCache[hid]) {
                    try { var r = await fetch('/api/Users/' + hid); if (r.ok) hostCache[hid] = await r.json(); } catch (e) { }
                }
                try { var pr = await fetch('/api/Listings/' + l.listingID + '/photos'); if (pr.ok) photoCache[l.listingID] = await pr.json(); } catch (e) { }
            }));

            var dateRange = '';
            if (arriveKey && departKey) {
                dateRange = ' · ' + new Date(arriveKey + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                    + ' → ' + new Date(departKey + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            }

            var cards = listings.map(function (l) {
                var hid = l.hostUserID || l.HostUserID;
                var host = hostCache[hid];
                var photos = photoCache[l.listingID] || [];
                var cover = photos[0];
                var coverHtml = cover ? '<div style="height:160px;overflow:hidden;background:var(--surface2)"><img src="' + cover.url + '" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.style.display=\'none\'" /></div>' : '';
                var badgeCls = l.isAvailable ? 'available' : 'unavailable';
                var badgeTxt = l.isAvailable ? 'Available' : 'Taken';
                var hostHtml = '';
                if (host) {
                    var initials = host.fullName ? host.fullName.charAt(0).toUpperCase() : '?';
                    var avatarHtml = host.profilePicUrl
                        ? '<img src="' + host.profilePicUrl + '" style="width:100%;height:100%;object-fit:cover"/>'
                        : '<div style="width:100%;height:100%;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700">' + initials + '</div>';
                    hostHtml = '<div style="display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">'
                        + '<div style="width:28px;height:28px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--red)">' + avatarHtml + '</div>'
                        + '<span style="font-size:13px;color:var(--muted)">Hosted by <strong style="color:var(--text)">' + (host.fullName || 'Host') + '</strong></span></div>';
                }
                return '<div class="listing-card" onclick="viewListing(' + l.listingID + ')" style="padding:0;overflow:hidden">'
                    + coverHtml
                    + '<div style="padding:18px">'
                    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">'
                    + '<h3>' + l.title + '</h3>'
                    + '<span class="badge ' + badgeCls + '">' + badgeTxt + '</span></div>'
                    + '<div class="location">📍 ' + (l.location || l.approximateLocation || 'Fayetteville, AR') + '</div>'
                    + '<div class="price">$' + l.pricePerHour + '<span>/hr</span></div>'
                    + hostHtml + '</div></div>';
            });

            container.innerHTML = '<div class="results-meta"><span class="results-count"><strong>' + listings.length + '</strong> listing' + (listings.length !== 1 ? 's' : '') + ' found' + dateRange + '</span></div><div class="listings-grid">' + cards.join('') + '</div>';

            if (window.currentView === 'map') loadMapView();

        } catch (e) {
            container.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><p>Error loading listings. Make sure the API is running.</p></div>';
        }
    }

    function setView(view) {
        window.currentView = view;
        var mapContainer = document.getElementById('map-container');
        var searchResults = document.getElementById('search-results');
        var btnList = document.getElementById('btn-list-view');
        var btnMap = document.getElementById('btn-map-view');
        if (view === 'map') {
            btnMap.classList.add('active'); btnList.classList.remove('active');
            mapContainer.classList.add('visible'); searchResults.style.display = 'none';
            loadMapView();
        } else {
            btnList.classList.add('active'); btnMap.classList.remove('active');
            mapContainer.classList.remove('visible'); searchResults.style.display = 'block';
            document.getElementById('map-notice').classList.remove('visible');
        }
    }

    async function loadMapView() {
        var LAT = 36.0682, LNG = -94.1719;
        if (!window.leafletMap) {
            window.leafletMap = L.map('leaflet-map').setView([LAT, LNG], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap contributors', maxZoom: 19 }).addTo(window.leafletMap);
        }
        clearMapMarkers();
        try {
            var res = await fetch('/api/Listings/locations');
            if (!res.ok) throw new Error();
            var locations = await res.json();
            if (!locations || !locations.length) return;
            var redIcon = L.divIcon({
                className: '',
                html: '<div style="width:28px;height:28px;background:#9d2235;border:3px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg);box-shadow:0 3px 10px rgba(157,34,53,0.45)"></div>',
                iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -30]
            });
            var hasNoCoords = false, boundsPoints = [];
            locations.forEach(function (l) {
                if (l.latitude == null || l.longitude == null) { hasNoCoords = true; return; }
                var lat = parseFloat(l.latitude), lng = parseFloat(l.longitude);
                if (isNaN(lat) || isNaN(lng)) { hasNoCoords = true; return; }
                boundsPoints.push([lat, lng]);
                var marker = L.marker([lat, lng], { icon: redIcon }).addTo(window.leafletMap);
                marker.bindPopup(
                    '<div class="map-popup">'
                    + '<div class="map-popup-title">' + l.title + '</div>'
                    + '<div class="map-popup-location">📍 ' + (l.location || l.approximateLocation || 'Fayetteville, AR') + '</div>'
                    + '<div class="map-popup-price">$' + l.pricePerHour + '<span>/hr</span></div>'
                    + '<div class="map-popup-badge"><span class="badge ' + (l.isAvailable ? 'available' : 'unavailable') + '">' + (l.isAvailable ? 'Available' : 'Taken') + '</span></div>'
                    + '<button class="map-popup-btn" onclick="viewListing(' + l.listingID + ')">View &amp; Reserve</button></div>',
                    { maxWidth: 230 }
                );
                window.mapMarkers.push(marker);
            });
            document.getElementById('map-notice').classList.toggle('visible', hasNoCoords);
            if (boundsPoints.length === 1) window.leafletMap.setView(boundsPoints[0], 16);
            else if (boundsPoints.length > 1) window.leafletMap.fitBounds(boundsPoints, { padding: [40, 40] });
            setTimeout(function () { window.leafletMap.invalidateSize(); }, 100);
        } catch (e) { console.error('Map load error:', e); }
    }

    function clearMapMarkers() {
        if (!window.leafletMap) return;
        (window.mapMarkers || []).forEach(function (m) { window.leafletMap.removeLayer(m); });
        window.mapMarkers = [];
    }

    window.clearMapMarkers = clearMapMarkers;
</script>
