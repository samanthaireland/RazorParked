<!-- ═══════════════════════════════════════════════════════     ADD THIS inside profile-tab-credits, after the Buy Credits     section card and before the Gift Credits section.═══════════════════════════════════════════════════════ --><!-- CARD ON FILE --><div class="rp-card-section" id="card-on-file-section" style="border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px">    <!-- No card saved — show form -->    <div id="cof-no-card">        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">            <div style="font-size:15px;font-weight:600">💳 Payment Card on File</div>        </div>        <div style="font-size:13px;color:var(--muted);margin-bottom:14px">Save a card to use at checkout or to top up credits quickly.</div>        <div class="form-group">            <label>Name on Card</label>            <input id="cof-name" type="text" placeholder="Jane Smith" />        </div>        <div class="form-group">            <label>Card Number</label>            <input id="cof-number" type="text" placeholder="4242 4242 4242 4242" maxlength="19"                   oninput="formatCofCardNumber(this)" />        </div>        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">            <div class="form-group">                <label>Expiry</label>                <input id="cof-expiry" type="text" placeholder="MM / YY" maxlength="7"                       oninput="formatCofExpiry(this)" />            </div>            <div class="form-group">                <label>CVV</label>                <input id="cof-cvv" type="password" placeholder="•••" maxlength="4" />            </div>        </div>        <button class="btn-primary" style="width:100%" onclick="saveCardOnFile()">Save Card</button>        <div id="cof-msg" class="msg"></div>    </div>    <!-- Card saved — show masked display -->    <div id="cof-has-card" style="display:none">        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">            <div style="font-size:15px;font-weight:600">💳 Payment Card on File</div>            <span style="font-size:10px;background:#edf7f0;color:#2d7a4f;border:1px solid #b3dfc4;padding:2px 8px;border-radius:99px;font-weight:600">Saved</span>        </div>        <div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px">            <div style="width:38px;height:26px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0">                <div style="width:24px;height:16px;background:#e8b84b;border-radius:2px"></div>            </div>            <div>                <div id="cof-display-num" style="font-size:15px;font-weight:600;letter-spacing:.1em;color:var(--text)">•••• •••• •••• ????</div>                <div id="cof-display-meta" style="font-size:12px;color:var(--muted);margin-top:2px">Name · Expires ??/??</div>            </div>            <button onclick="removeCardOnFile()"                    style="margin-left:auto;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1"                    title="Remove card">                ✕            </button>        </div>    </div></div>
